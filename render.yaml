databases:
  - name: davex-db
    plan: free
    databaseName: davex
    user: davex

services:
  - type: web
    name: DAVE-X
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SESSION_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: davex-db
          property: connectionString